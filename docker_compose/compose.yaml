services:
  scylla:
    container_name: scylla-node
    image: scylladb/scylla:2026.1.1
    command: --developer-mode 1 --smp 1 --overprovisioned 1 --authenticator PasswordAuthenticator --authorizer CassandraAuthorizer
    ports:
      - "9042:9042"
    networks:
      - scylladb
    healthcheck:
      test: ["CMD-SHELL", "nodetool status"]
      interval: 10s
      timeout: 5s
      retries: 10

  init-db:
    image: scylladb/scylla:2026.1.1
    container_name: scylla-init
    volumes:
      - ./init.cql:/init.cql
    depends_on:
      scylla:
        condition: service_healthy
    entrypoint: ["cqlsh", "scylla", "9042", "-u", "cassandra", "-p", "cassandra", "-f", "/init.cql"]
    networks:
      - scylladb

networks:
  scylladb:
    driver: bridge
